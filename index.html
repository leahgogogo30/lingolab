<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LingoLab</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LingoLab">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap');

  :root {
    --ink: #1a1a2e;
    --ink-soft: #4a4a6a;
    --ink-muted: #9090b0;
    --page: #f7f6f2;
    --page-warm: #eeeae0;
    --accent: #2563d4;
    --accent-light: #e8efff;
    --green: #16a34a;
    --green-light: #dcfce7;
    --amber: #d97706;
    --amber-light: #fef3c7;
    --red: #dc2626;
    --red-light: #fee2e2;
    --border: #ddd8cc;
    --shadow: 0 2px 12px rgba(26,26,46,0.08);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--page);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    background: var(--ink);
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    letter-spacing: -0.3px;
  }
  .logo span { color: #7da8ff; font-style: italic; }
  .streak-badge {
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Nav */
  nav {
    background: white;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  .nav-btn {
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .nav-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .nav-btn:hover:not(.active) { color: var(--ink); }

  /* Main */
  main {
    flex: 1;
    max-width: 800px;
    margin: 0 auto;
    width: 100%;
    padding: 24px 16px;
  }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Cards */
  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--ink-muted);
    margin-bottom: 14px;
  }

  /* Inputs */
  input[type=text], input[type=number], textarea, select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--page);
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); background: white; }
  textarea { resize: vertical; min-height: 80px; }

  /* Buttons */
  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #1d4bb8; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--ink-soft); }
  .btn-ghost:hover { border-color: var(--ink-soft); color: var(--ink); }
  .btn-danger { background: none; border: 1px solid var(--border); color: var(--red); }
  .btn-danger:hover { background: var(--red-light); border-color: var(--red); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* Vocab panel */
  .add-vocab-form { display: flex; gap: 10px; margin-bottom: 4px; }
  .add-vocab-form input { flex: 1; }

  .vocab-item {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 10px;
    background: white;
    transition: box-shadow 0.15s;
  }
  .vocab-item:hover { box-shadow: var(--shadow); }
  .vocab-word {
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .vocab-word-actions { display: flex; gap: 6px; }
  .vocab-meta { font-size: 12px; color: var(--ink-muted); margin-bottom: 8px; }
  .vocab-explanation {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.7;
    background: var(--page);
    border-radius: 6px;
    padding: 10px 12px;
  }
  .vocab-explanation.loading { color: var(--ink-muted); font-style: italic; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    background: var(--accent-light);
    color: var(--accent);
    margin-left: 8px;
  }
  .tag.new { background: var(--green-light); color: var(--green); }
  .tag.review { background: var(--amber-light); color: var(--amber); }

  /* Practice panel */
  .practice-modes { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .mode-card {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .mode-card:hover, .mode-card.selected { border-color: var(--accent); background: var(--accent-light); }
  .mode-icon { font-size: 28px; margin-bottom: 6px; }
  .mode-name { font-size: 13px; font-weight: 600; }
  .mode-desc { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }

  .practice-area { display: none; }
  .practice-area.active { display: block; }
  .prompt-box {
    background: var(--ink);
    color: white;
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 14px;
    font-size: 14px;
    line-height: 1.7;
  }
  .prompt-box .label { font-size: 11px; color: #7da8ff; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .feedback-box {
    border-radius: 10px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.7;
    margin-top: 14px;
  }
  .feedback-box.good { background: var(--green-light); border: 1px solid #86efac; }
  .feedback-box.ok { background: var(--amber-light); border: 1px solid #fcd34d; }
  .feedback-box.retry { background: var(--red-light); border: 1px solid #fca5a5; }
  .feedback-title { font-weight: 600; margin-bottom: 6px; font-size: 14px; }

  /* Goals panel */
  .goal-form { display: grid; gap: 10px; }
  .goal-form-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
  .goal-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    background: white;
  }
  .goal-check {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .goal-check.done { background: var(--green); border-color: var(--green); color: white; }
  .goal-info { flex: 1; }
  .goal-name { font-size: 14px; font-weight: 500; }
  .goal-progress-text { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
  .progress-fill.done { background: var(--green); }

  /* Stats panel */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .stat-number { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--ink); line-height: 1; }
  .stat-label { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }
  .stat-change { font-size: 11px; margin-top: 4px; }
  .stat-change.up { color: var(--green); }

  .activity-log { max-height: 320px; overflow-y: auto; }
  .log-item {
    display: flex;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .log-item:last-child { border-bottom: none; }
  .log-date { color: var(--ink-muted); white-space: nowrap; min-width: 70px; }
  .log-text { color: var(--ink-soft); }
  .log-badge {
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Misc */
  .row { display: flex; gap: 10px; align-items: flex-start; }
  .search-bar { margin-bottom: 14px; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
  .empty-state p { font-size: 13px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-title { font-size: 15px; font-weight: 600; }
  .count-badge { background: var(--ink); color: white; border-radius: 12px; padding: 2px 9px; font-size: 12px; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

  /* Loading spinner */
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Chart */
  #vocabChart { width: 100%; height: 120px; }

  /* Notes */
  .note-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  .note-card:hover { box-shadow: var(--shadow); }
  .note-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
  .note-card-title { font-size: 15px; font-weight: 600; color: var(--ink); line-height: 1.3; }
  .note-card-date { font-size: 11px; color: var(--ink-muted); white-space: nowrap; margin-top: 2px; }
  .note-card-preview { font-size: 13px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .note-card-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .note-word-chip { background: var(--accent-light); color: var(--accent); border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 500; }
  .note-summary-chip { background: var(--green-light); color: var(--green); border-radius: 4px; padding: 2px 7px; font-size: 11px; }
  .note-summary-box {
    background: var(--page);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 14px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--ink-soft);
  }
  .note-summary-box .summary-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--green); margin-bottom: 6px; }
  .words-added-toast {
    background: var(--green);
    color: white;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }

  /* PWA Install Banner */
  #installBanner {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: white;
    padding: 14px 18px;
    border-radius: 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    z-index: 999;
    width: calc(100% - 32px);
    max-width: 440px;
    display: none;
    align-items: center;
    gap: 12px;
    font-size: 13px;
  }
  #installBanner.visible { display: flex; }
  .install-icon { font-size: 28px; flex-shrink: 0; }
  .install-text { flex: 1; line-height: 1.4; }
  .install-text strong { display: block; font-size: 14px; margin-bottom: 2px; }
  .install-text span { color: rgba(255,255,255,0.6); font-size: 12px; }
  .install-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .btn-install { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .btn-dismiss { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 11px; cursor: pointer; text-align: center; }

  @media (max-width: 500px) {
    .practice-modes { grid-template-columns: 1fr 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .goal-form-row { grid-template-columns: 1fr 1fr; }
    .goal-form-row input:first-child { grid-column: 1/-1; }
    .add-vocab-form { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Lingo<span>Lab</span></div>
  <div class="streak-badge">🔥 <span id="streakDisplay">0</span> 天连续</div>
</header>

<!-- PWA Install Banner -->
<div id="installBanner">
  <div class="install-icon">📱</div>
  <div class="install-text">
    <strong>安装到手机桌面</strong>
    <span>像App一样使用，随时打开</span>
  </div>
  <div class="install-actions">
    <button class="btn-install" id="installBtn">安装</button>
    <button class="btn-dismiss" id="dismissBtn">以后再说</button>
  </div>
</div>

<nav>
  <button class="nav-btn active" data-panel="vocab">📖 生词本</button>
  <button class="nav-btn" data-panel="notes">📝 笔记本</button>
  <button class="nav-btn" data-panel="practice">✍️ 每日练习</button>
  <button class="nav-btn" data-panel="goals">🎯 学习目标</button>
  <button class="nav-btn" data-panel="stats">📊 数据统计</button>
</nav>

<main>

  <!-- VOCAB PANEL -->
  <div class="panel active" id="panel-vocab">
    <div class="card">
      <div class="card-title">添加新词汇 / 表达</div>
      <div class="add-vocab-form">
        <input type="text" id="vocabInput" placeholder="输入英文词汇或表达，如 "pull off" 或 "ambiguous"" />
        <button class="btn btn-primary" id="addVocabBtn" onclick="addVocab()">
          <span id="addBtnText">添加</span>
        </button>
      </div>
      <div style="margin-top:8px; font-size:12px; color:var(--ink-muted);">AI 会自动生成中文释义、例句和使用场景</div>
    </div>

    <div class="search-bar">
      <input type="text" id="vocabSearch" placeholder="搜索词汇..." oninput="renderVocab()" />
    </div>

    <div class="section-header">
      <div class="section-title">词汇库</div>
      <span class="count-badge" id="vocabCount">0</span>
    </div>
    <div id="vocabList"></div>
  </div>

  <!-- PRACTICE PANEL -->
  <div class="panel" id="panel-practice">
    <div class="card">
      <div class="card-title">选择练习模式</div>
      <div class="practice-modes">
        <div class="mode-card selected" data-mode="writing" onclick="selectMode(this)">
          <div class="mode-icon">✍️</div>
          <div class="mode-name">写作练习</div>
          <div class="mode-desc">AI出题，写段落拿反馈</div>
        </div>
        <div class="mode-card" data-mode="vocab" onclick="selectMode(this)">
          <div class="mode-icon">🃏</div>
          <div class="mode-name">词汇运用</div>
          <div class="mode-desc">用生词造句</div>
        </div>
        <div class="mode-card" data-mode="translate" onclick="selectMode(this)">
          <div class="mode-icon">🔄</div>
          <div class="mode-name">翻译训练</div>
          <div class="mode-desc">中译英，精准表达</div>
        </div>
        <div class="mode-card" data-mode="conversation" onclick="selectMode(this)">
          <div class="mode-icon">💬</div>
          <div class="mode-name">口语模拟</div>
          <div class="mode-desc">模拟真实对话场景</div>
        </div>
      </div>
      <div id="topicSelectorWrap" style="margin-bottom:12px;display:none">
        <div style="font-size:12px;color:var(--ink-muted);margin-bottom:6px;">选择笔记本 Topic（专项练习）</div>
        <select id="topicSelector" style="width:100%">
          <option value="">随机出题（不限Topic）</option>
        </select>
      </div>
      <button class="btn btn-primary" style="width:100%" id="startPracticeBtn" onclick="startPractice()">
        开始练习
      </button>
    </div>

    <div class="practice-area card" id="practiceArea">
      <div class="prompt-box" id="promptBox">
        <div class="label">练习题目</div>
        <div id="promptText"></div>
      </div>
      <textarea id="userAnswer" placeholder="在这里写下你的答案..." rows="5"></textarea>
      <div style="display:flex; gap:10px; margin-top:10px;">
        <button class="btn btn-primary" style="flex:1" id="submitBtn" onclick="submitAnswer()">提交答案</button>
        <button class="btn btn-ghost" onclick="startPractice()">换一题</button>
      </div>
      <div id="feedbackBox"></div>
    </div>
  </div>

  <!-- GOALS PANEL -->
  <div class="panel" id="panel-goals">
    <div class="card">
      <div class="card-title">添加学习目标</div>
      <div class="goal-form">
        <input type="text" id="goalName" placeholder="目标描述，如"每周练习3次写作"" />
        <div class="goal-form-row">
          <select id="goalPeriod">
            <option value="daily">每天</option>
            <option value="weekly" selected>每周</option>
            <option value="monthly">每月</option>
          </select>
          <input type="number" id="goalTarget" placeholder="目标次数" min="1" value="3" />
          <button class="btn btn-primary" onclick="addGoal()">添加</button>
        </div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">本周目标</div>
      <button class="btn btn-ghost btn-sm" onclick="resetWeeklyProgress()">重置进度</button>
    </div>
    <div id="goalsList"></div>
  </div>

  <!-- NOTES PANEL -->
  <div class="panel" id="panel-notes">

    <!-- Note editor (hidden by default) -->
    <div id="noteEditor" style="display:none">
      <div class="card">
        <input type="text" id="noteTitle" placeholder="Topic，如 "Talking about hobbies"" style="font-size:16px;font-weight:600;border:none;background:none;padding:0;margin-bottom:12px;outline:none;width:100%" />
        <div style="display:flex;gap:10px;margin-bottom:12px;align-items:center">
          <select id="noteCategory" style="font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--page);color:var(--ink);flex:1">
            <option value="">📂 选择分类</option>
            <option value="生活">🏠 生活</option>
            <option value="工作">💼 工作</option>
            <option value="旅行">✈️ 旅行</option>
            <option value="社交">🤝 社交</option>
            <option value="文化">🎭 文化</option>
            <option value="健康">💪 健康</option>
            <option value="其他">📌 其他</option>
          </select>
          <button class="btn btn-ghost btn-sm" id="autoCategoryBtn" onclick="autoCategory()" style="white-space:nowrap">✨ 自动分类</button>
        </div>
        <div style="font-size:12px;color:var(--ink-muted);margin-bottom:4px;">课堂笔记</div>
        <textarea id="noteBody" placeholder="记录这节课讲了什么、用了哪些表达、印象深的点..." rows="6"></textarea>
        <div style="font-size:12px;color:var(--ink-muted);margin-top:12px;margin-bottom:4px;">值得记录的词/句（每行一条，词和句子都可以）</div>
        <textarea id="noteWords" placeholder="pull off&#10;come across&#10;I couldn't agree more.&#10;That's a fair point, but..." rows="4"></textarea>
        <div style="font-size:12px;color:var(--ink-muted);margin-top:12px;margin-bottom:4px;">🎯 实战表达（完整段落/对话，复习用）</div>

<script>
// ===================== SUPABASE CONFIG =====================
const SUPABASE_URL = 'https://pkzepxyszqmyognmsvtx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_i-qlsUNcc68nJxxDMnYNoQ_1WUfdDOs';

async function sbFetch(path, method = 'GET', body = null, extra = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}${extra}`, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : null
  });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

// ===================== STORAGE =====================
function defaultData() {
  return {
    vocab: [],
    goals: [],
    notes: [],
    activity: [],
    streak: { count: 0, lastDate: '' },
    totalPractice: 0
  };
}

let appData = defaultData();

// Show loading overlay
function showLoading(msg = '加载中...') {
  let el = document.getElementById('loadingOverlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'loadingOverlay';
    el.style.cssText = 'position:fixed;inset:0;background:rgba(247,246,242,0.9);display:flex;align-items:center;justify-content:center;z-index:500;font-size:14px;color:var(--ink-soft);flex-direction:column;gap:12px;';
    el.innerHTML = `<div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite"></div><div id="loadingMsg">${msg}</div>`;
    document.body.appendChild(el);
  }
  document.getElementById('loadingMsg').textContent = msg;
  el.style.display = 'flex';
}

function hideLoading() {
  const el = document.getElementById('loadingOverlay');
  if (el) el.style.display = 'none';
}

async function loadAllData() {
  showLoading('同步数据中...');
  try {
    const [vocab, notes, goals, activity, settings] = await Promise.all([
      sbFetch('vocab?order=added_date.desc'),
      sbFetch('notes?order=date.desc'),
      sbFetch('goals?order=id.asc'),
      sbFetch('activity?order=date.desc&limit=100'),
      sbFetch('settings')
    ]);

    appData.vocab = (vocab || []).map(v => ({
      id: v.id, word: v.word, type: v.type || 'word',
      explanation: v.explanation || '生成中...',
      addedDate: v.added_date, reviewCount: v.review_count || 0, status: v.status || 'new'
    }));

    appData.notes = (notes || []).map(n => ({
      id: n.id, title: n.title, body: n.body,
      words: n.words || [], summary: n.summary || '',
      category: n.category || '',
      practice: n.practice || '',
      date: n.date, updatedDate: n.updated_date
    }));

    appData.goals = (goals || []).map(g => ({
      id: g.id, name: g.name, period: g.period,
      target: g.target, current: g.current, done: g.done
    }));

    appData.activity = (activity || []).map(a => ({
      type: a.type, text: a.text, date: a.date
    }));

    const streakSetting = (settings || []).find(s => s.key === 'streak');
    if (streakSetting) {
      try { appData.streak = JSON.parse(streakSetting.value); } catch {}
    }
    const practiceSetting = (settings || []).find(s => s.key === 'totalPractice');
    if (practiceSetting) appData.totalPractice = parseInt(practiceSetting.value) || 0;

  } catch (e) {
    console.error('Load error:', e);
    // Fallback to localStorage
    try {
      const raw = localStorage.getItem('lingolab_data');
      if (raw) appData = JSON.parse(raw);
    } catch {}
  }
  hideLoading();
}

async function saveVocab(entry) {
  try {
    await sbFetch('vocab', 'POST', {
      id: entry.id, word: entry.word, type: entry.type || 'word',
      explanation: entry.explanation, added_date: entry.addedDate,
      review_count: entry.reviewCount, status: entry.status
    });
  } catch (e) { console.error('saveVocab:', e); }
}

async function updateVocab(entry) {
  try {
    await sbFetch(`vocab?id=eq.${entry.id}`, 'PATCH', {
      explanation: entry.explanation,
      review_count: entry.reviewCount,
      status: entry.status
    });
  } catch (e) { console.error('updateVocab:', e); }
}

async function deleteVocabDb(id) {
  try { await sbFetch(`vocab?id=eq.${id}`, 'DELETE'); } catch (e) { console.error(e); }
}

async function saveNoteToDb(noteObj) {
  try {
    await sbFetch('notes', 'POST', {
      id: noteObj.id, title: noteObj.title, body: noteObj.body,
      words: noteObj.words, summary: noteObj.summary || '',
      date: noteObj.date, updated_date: noteObj.updatedDate,
      category: noteObj.category || '',
      practice: noteObj.practice || ''
    });
  } catch (e) { console.error('saveNote:', e); }
}

async function updateNote(noteObj) {
  try {
    await sbFetch(`notes?id=eq.${noteObj.id}`, 'PATCH', {
      title: noteObj.title, body: noteObj.body,
      words: noteObj.words, summary: noteObj.summary || '',
      updated_date: noteObj.updatedDate,
      category: noteObj.category || '',
      practice: noteObj.practice || ''
    });
  } catch (e) { console.error('updateNote:', e); }
}

async function deleteNoteDb(id) {
  try { await sbFetch(`notes?id=eq.${id}`, 'DELETE'); } catch (e) { console.error(e); }
}

async function saveGoal(goal) {
  try {
    await sbFetch('goals', 'POST', {
      id: goal.id, name: goal.name, period: goal.period,
      target: goal.target, current: goal.current, done: goal.done
    });
  } catch (e) { console.error('saveGoal:', e); }
}

async function updateGoalDb(goal) {
  try {
    await sbFetch(`goals?id=eq.${goal.id}`, 'PATCH', {
      current: goal.current, done: goal.done
    });
  } catch (e) { console.error('updateGoal:', e); }
}

async function deleteGoalDb(id) {
  try { await sbFetch(`goals?id=eq.${id}`, 'DELETE'); } catch (e) { console.error(e); }
}

async function saveActivity(item) {
  try {
    await sbFetch('activity', 'POST', {
      type: item.type, text: item.text, date: item.date
    });
  } catch (e) { console.error('saveActivity:', e); }
}

async function saveSetting(key, value) {
  try {
    await sbFetch('settings', 'POST', { key, value: JSON.stringify(value) }, '');
  } catch {
    try { await sbFetch(`settings?key=eq.${key}`, 'PATCH', { value: JSON.stringify(value) }); }
    catch (e) { console.error('saveSetting:', e); }
  }
}

// Keep localStorage as backup
function saveLocalBackup() {
  try { localStorage.setItem('lingolab_data', JSON.stringify(appData)); } catch {}
}


// ===================== NAV =====================
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
    if (btn.dataset.panel === 'stats') renderStats();
    if (btn.dataset.panel === 'notes') renderNotes();
  });
});

// ===================== STREAK =====================
function updateStreak() {
  const today = new Date().toDateString();
  const s = appData.streak;
  if (s.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (s.lastDate === yesterday) {
    s.count++;
  } else if (s.lastDate !== today) {
    s.count = 1;
  }
  s.lastDate = today;
  saveSetting('streak', s);
  saveLocalBackup();
  document.getElementById('streakDisplay').textContent = s.count;
}

// ===================== VOCAB =====================
async function addVocab() {
  const input = document.getElementById('vocabInput');
  const word = input.value.trim();
  if (!word) return;

  const btn = document.getElementById('addVocabBtn');
  const btnText = document.getElementById('addBtnText');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span>';

  const entry = {
    id: Date.now(),
    word: word,
    type: 'word',
    explanation: '生成中...',
    addedDate: new Date().toISOString(),
    reviewCount: 0,
    status: 'new'
  };

  appData.vocab.unshift(entry);
  renderVocab();
  input.value = '';
  saveVocab(entry);
  saveLocalBackup();

  // AI generate explanation
  try {
    const explanation = await callClaude(`You are an English learning assistant for a Chinese learner. The user wants to learn this English word or phrase: "${word}". 

Provide a concise, practical explanation in the following format (use Chinese for explanations):

**释义**: [中文释义，简洁]
**词性**: [词性/短语类型]
**例句1**: [自然的英语例句] — [中文翻译]
**例句2**: [另一个场景的例句] — [中文翻译]  
**使用提示**: [一句话说明这个词的使用场景或搭配，用中文]

Keep it practical and focused on real usage.`);

    const idx = appData.vocab.findIndex(v => v.id === entry.id);
    if (idx !== -1) {
      appData.vocab[idx].explanation = explanation;
      updateVocab(appData.vocab[idx]);
      saveLocalBackup();
      renderVocab();
    }
  } catch (e) {
    const idx = appData.vocab.findIndex(v => v.id === entry.id);
    if (idx !== -1) {
      appData.vocab[idx].explanation = '解释加载失败，请检查网络连接。';
      updateVocab(appData.vocab[idx]);
      saveLocalBackup();
      renderVocab();
    }
  }

  btn.disabled = false;
  btnText.textContent = '添加';
  logActivity('vocab', `添加了新词汇: ${word}`);
  updateStreak();
}

function deleteVocab(id) {
  appData.vocab = appData.vocab.filter(v => v.id !== id);
  deleteVocabDb(id);
  saveLocalBackup();
  renderVocab();
}

function renderVocab() {
  const query = document.getElementById('vocabSearch').value.toLowerCase();
  const list = document.getElementById('vocabList');
  const filtered = appData.vocab.filter(v =>
    v.word.toLowerCase().includes(query) ||
    (v.explanation || '').toLowerCase().includes(query)
  );

  document.getElementById('vocabCount').textContent = appData.vocab.length;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">📚</div><p>${appData.vocab.length === 0 ? '还没有词汇，添加第一个吧！' : '没有找到匹配的词汇'}</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(v => {
    const isNew = (Date.now() - new Date(v.addedDate)) < 86400000 * 3;
    const tagHtml = isNew ? '<span class="tag new">新</span>' : '';
    const typeTag = v.type === 'sentence' ? '<span class="tag" style="background:#f3e8ff;color:#7c3aed">句</span>' : '';
    const explanationClass = v.explanation === '生成中...' ? 'vocab-explanation loading' : 'vocab-explanation';
    const explanationHtml = formatExplanation(v.explanation || '');

    return `<div class="vocab-item">
      <div class="vocab-word">
        <span>${v.word}${tagHtml}${typeTag}</span>
        <div class="vocab-word-actions">
          <button class="btn btn-ghost btn-sm" onclick="markReview(${v.id})">复习</button>
          <button class="btn btn-danger btn-sm" onclick="deleteVocab(${v.id})">删除</button>
        </div>
      </div>
      <div class="vocab-meta">添加于 ${formatDate(v.addedDate)} · 复习 ${v.reviewCount} 次</div>
      <div class="${explanationClass}">${explanationHtml}</div>
    </div>`;
  }).join('');
}

function formatExplanation(text) {
  // Convert **bold** to <strong> and newlines to <br>
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function markReview(id) {
  const idx = appData.vocab.findIndex(v => v.id === id);
  if (idx !== -1) {
    appData.vocab[idx].reviewCount++;
    appData.vocab[idx].status = 'review';
    updateVocab(appData.vocab[idx]);
    saveLocalBackup();
    renderVocab();
    logActivity('review', `复习词汇: ${appData.vocab[idx].word}`);
  }
}

// ===================== PRACTICE =====================
let currentMode = 'writing';
let currentPrompt = '';

function selectMode(el) {
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  currentMode = el.dataset.mode;
  document.getElementById('practiceArea').classList.remove('active');
  document.getElementById('feedbackBox').innerHTML = '';
}

async function startPractice() {
  const area = document.getElementById('practiceArea');
  area.classList.add('active');
  document.getElementById('userAnswer').value = '';
  document.getElementById('feedbackBox').innerHTML = '';
  document.getElementById('promptText').textContent = '生成题目中...';
  document.getElementById('submitBtn').disabled = false;

  // Check if a topic is selected
  const topicSel = document.getElementById('topicSelector');
  const selectedTopicId = topicSel ? topicSel.value : '';
  const selectedNote = selectedTopicId
    ? (appData.notes || []).find(n => n.id == selectedTopicId)
    : null;

  const vocabSample = appData.vocab.slice(0, 10).map(v => v.word).join(', ');

  let topicContext = '';
  if (selectedNote) {
    const noteWords = (selectedNote.words || []).join(', ');
    topicContext = `The lesson topic was: "${selectedNote.title}". 
Key words/phrases from this lesson: ${noteWords || 'none specified'}.
Class notes: ${selectedNote.body || 'none'}.
Create a practice question specifically related to this topic and vocabulary.`;
  } else {
    topicContext = `The learner knows these words: ${vocabSample || 'basic vocabulary'}.`;
  }

  const prompts = {
    writing: `Generate a writing practice prompt for an intermediate English learner. ${topicContext} Create a situational prompt that requires 3-5 sentences. Make it practical and interesting. Give ONLY the prompt, in English, no explanation.`,
    vocab: `Create a vocabulary practice exercise. ${topicContext} Ask the learner to use a specific word or phrase in a sentence. Format: "Use the word/phrase [word] in a sentence about [topic]." Give ONLY the instruction.`,
    translate: `Create a Chinese sentence for an intermediate learner to translate into English. ${selectedNote ? `The sentence should relate to the topic: "${selectedNote.title}".` : 'Use everyday language.'} 15-25 characters. Give ONLY the Chinese sentence, nothing else.`,
    conversation: `Create a realistic conversation scenario for an English learner. ${selectedNote ? `The scenario should relate to the topic: "${selectedNote.title}".` : ''} Example: "You're at a job interview and the interviewer asks about your biggest weakness. How do you respond?" Give ONLY the scenario, in English.`
  };

  try {
    currentPrompt = await callClaude(prompts[currentMode]);
    document.getElementById('promptText').textContent = currentPrompt;
    if (selectedNote) {
      document.getElementById('promptBox').insertAdjacentHTML('afterbegin',
        `<div style="font-size:11px;color:#7da8ff;margin-bottom:6px;">🎯 专项练习 · ${selectedNote.title}</div>`);
    }
  } catch {
    document.getElementById('promptText').textContent = '题目生成失败，请重试。';
  }
}

async function submitAnswer() {
  const answer = document.getElementById('userAnswer').value.trim();
  if (!answer) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 评估中';
  document.getElementById('feedbackBox').innerHTML = '';

  const modeNames = { writing: '写作', vocab: '词汇运用', translate: '翻译', conversation: '口语表达' };

  try {
    const feedback = await callClaude(`You are an English teacher giving feedback to a Chinese learner. 

Practice type: ${modeNames[currentMode]}
Prompt: ${currentPrompt}
Student's answer: ${answer}

Give feedback in this format:
1. Start with one of: ✅ 很好！/ ⚠️ 不错，但可以改进 / ❌ 需要改正
2. Point out 1-2 specific strengths (in Chinese)
3. Point out 1-2 specific errors or improvements (in Chinese), with corrected version in English
4. Give a model answer or improved version in English
5. Teach 1 new expression or grammar point related to the topic

Keep feedback practical, encouraging, and under 200 words total. Write in Chinese except for English examples.`);

    const tone = feedback.includes('✅') ? 'good' : feedback.includes('❌') ? 'retry' : 'ok';
    document.getElementById('feedbackBox').innerHTML = `<div class="feedback-box ${tone}">${formatExplanation(feedback)}</div>`;

    appData.totalPractice++;
    saveLocalBackup();
    saveSetting('totalPractice', appData.totalPractice);
    logActivity('practice', `完成${modeNames[currentMode]}练习`);
    updateStreak();
    updateGoalProgress('practice');
  } catch {
    document.getElementById('feedbackBox').innerHTML = `<div class="feedback-box retry">反馈加载失败，请重试。</div>`;
  }

  btn.disabled = false;
  btn.textContent = '再次提交';
}

// ===================== GOALS =====================
function addGoal() {
  const name = document.getElementById('goalName').value.trim();
  const period = document.getElementById('goalPeriod').value;
  const target = parseInt(document.getElementById('goalTarget').value) || 3;

  if (!name) return;

  const goal = {
    id: Date.now(),
    name,
    period,
    target,
    current: 0,
    done: false
  };
  appData.goals.push(goal);
  saveGoal(goal);
  saveLocalBackup();
  renderGoals();
  document.getElementById('goalName').value = '';
}

function renderGoals() {
  const list = document.getElementById('goalsList');
  if (appData.goals.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🎯</div><p>还没有设定目标，添加一个吧！</p></div>`;
    return;
  }

  const periodNames = { daily: '每天', weekly: '每周', monthly: '每月' };

  list.innerHTML = appData.goals.map(g => {
    const pct = Math.min(100, Math.round((g.current / g.target) * 100));
    const done = g.current >= g.target;
    return `<div class="goal-item">
      <div class="goal-check ${done ? 'done' : ''}" onclick="incrementGoal(${g.id})">${done ? '✓' : ''}</div>
      <div class="goal-info">
        <div class="goal-name">${g.name}</div>
        <div class="goal-progress-text">${periodNames[g.period]} · ${g.current}/${g.target} 次完成</div>
        <div class="progress-bar"><div class="progress-fill ${done ? 'done' : ''}" style="width:${pct}%"></div></div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        <button class="btn btn-ghost btn-sm" onclick="incrementGoal(${g.id})">+1</button>
        <button class="btn btn-danger btn-sm" onclick="deleteGoal(${g.id})">✕</button>
      </div>
    </div>`;
  }).join('');
}

function incrementGoal(id) {
  const g = appData.goals.find(g => g.id === id);
  if (g) { g.current = Math.min(g.target, g.current + 1); updateGoalDb(g); saveLocalBackup(); renderGoals(); }
}

function deleteGoal(id) {
  appData.goals = appData.goals.filter(g => g.id !== id);
  deleteGoalDb(id);
  saveLocalBackup();
  renderGoals();
}

function resetWeeklyProgress() {
  appData.goals.forEach(g => { g.current = 0; g.done = false; updateGoalDb(g); });
  saveLocalBackup();
  renderGoals();
}

function updateGoalProgress(type) {
  appData.goals.forEach(g => {
    if (g.name.includes('练习') || g.name.includes('practice')) {
      g.current = Math.min(g.target, g.current + 1);
      updateGoalDb(g);
    }
  });
  saveLocalBackup();
  renderGoals();
}

// ===================== STATS =====================
function renderStats() {
  document.getElementById('statVocab').textContent = appData.vocab.length;
  document.getElementById('statPractice').textContent = appData.totalPractice;
  document.getElementById('statStreak').textContent = appData.streak.count;

  // This week vocab
  const weekAgo = Date.now() - 7 * 86400000;
  const weekVocab = appData.vocab.filter(v => new Date(v.addedDate) > weekAgo).length;
  document.getElementById('statWeek').textContent = weekVocab;

  renderActivityLog();
  renderChart();
}

function renderActivityLog() {
  const log = document.getElementById('activityLog');
  const items = [...appData.activity].reverse().slice(0, 20);

  if (items.length === 0) {
    log.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>还没有活动记录</p></div>`;
    return;

    </div>`;

}

function renderChart() {
  const canvas = document.getElementById('vocabChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 120 * dpr;
  ctx.scale(dpr, dpr);
  const W = rect.width, H = 120;

  // Build daily vocab counts for last 7 days
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i * 86400000);
    const label = `${d.getMonth()+1}/${d.getDate()}`;
    const count = appData.vocab.filter(v => {
      const vd = new Date(v.addedDate);
      return vd.toDateString() === d.toDateString();
    }).length;
    days.push({ label, count });
  }

  const max = Math.max(...days.map(d => d.count), 1);
  const pad = { l: 30, r: 10, t: 10, b: 24 };
  const chartW = W - pad.l - pad.r;
  const chartH = H - pad.t - pad.b;
  const barW = chartW / days.length;

  ctx.clearRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#e8e4d8';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = pad.t + chartH - (i / 3) * chartH;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
  }

  // Bars
  days.forEach((d, i) => {
    const x = pad.l + i * barW;
    const bh = (d.count / max) * chartH;
    const y = pad.t + chartH - bh;

    ctx.fillStyle = d.count > 0 ? '#2563d4' : '#e8e4d8';
    const bw = barW * 0.5;
    const bx = x + (barW - bw) / 2;
    ctx.beginPath();
    ctx.roundRect(bx, y, bw, bh || 2, [4, 4, 0, 0]);
    ctx.fill();

    if (d.count > 0) {
      ctx.fillStyle = '#1a1a2e';
      ctx.font = '10px Inter';
      ctx.textAlign = 'center';
      ctx.fillText(d.count, bx + bw / 2, y - 3);
    }

    // Label
    ctx.fillStyle = '#9090b0';
    ctx.font = '10px Inter';
    ctx.textAlign = 'center';
    ctx.fillText(d.label, x + barW / 2, H - 4);
  });
}

// ===================== HELPERS =====================
function formatDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = Math.floor((now - d) / 86400000);
  if (diff === 0) return '今天';
  if (diff === 1) return '昨天';
  if (diff < 7) return `${diff}天前`;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

async function callClaude(prompt) {
  const res = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer sk-a9ce959f2ffb49a49757dfd07d021302'
    },
    body: JSON.stringify({
      model: 'deepseek-chat',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) throw new Error('DeepSeek API error');
  const data = await res.json();
  return data.choices?.[0]?.message?.content || '';
}

function saveNote() {
  const title = document.getElementById('noteTitle').value.trim();
  const body = document.getElementById('noteBody').value.trim();
  const wordsRaw = document.getElementById('noteWords').value.trim();
  const category = document.getElementById('noteCategory').value;
  const practice = document.getElementById('notePractice').value.trim();
  if (!title && !body && !practice) return;

  const words = wordsRaw ? wordsRaw.split('\n').map(w => w.trim()).filter(Boolean) : [];

  if (!appData.notes) appData.notes = [];

  if (editingNoteId) {
    const idx = appData.notes.findIndex(n => n.id === editingNoteId);
    if (idx !== -1) {
      appData.notes[idx] = { ...appData.notes[idx], title, body, words, category, practice, updatedDate: new Date().toISOString() };
      updateNote(appData.notes[idx]);
      saveLocalBackup();
    }
  } else {
    const noteObj = {
      id: Date.now(),
      title, body, words, category, practice,
      summary: '',
      date: new Date().toISOString(),
      updatedDate: new Date().toISOString()
    };
    appData.notes.unshift(noteObj);
    saveNoteToDb(noteObj);
    saveLocalBackup();
    logActivity('notes', `记录笔记: ${title || '无标题'}`);
    updateStreak();
  }
  cancelNote();
  renderNotes();
}

async function aiExtractWords() {
  const body = document.getElementById('noteBody').value.trim();
  const manualWords = document.getElementById('noteWords').value.trim();
  const content = body + '\n' + manualWords;
  if (!content.trim()) { alert('请先写笔记内容或填写词/句'); return; }

  const btn = document.getElementById('aiWordsBtnText');
  btn.innerHTML = '<span class="spinner" style="border-color:rgba(0,0,0,0.2);border-top-color:#1a1a2e"></span> 提取中';

  try {
    // Ask AI to classify each item as word/phrase or sentence
    const result = await callClaude(`You are an English learning assistant. From the text below, extract all English words, phrases, and sentences worth learning for a Chinese learner.

Return ONLY a JSON array of objects, no markdown, no explanation:
[{"text": "pull off", "type": "word"}, {"text": "I couldn't agree more.", "type": "sentence"}]

Rules:
- type is "word" if it's a single word or short phrase (under 6 words)
- type is "sentence" if it's a full sentence or longer expression
- Include items from BOTH the notes and the word/sentence list provided

Text:
${content}`);

    let items = [];
    try {
      const clean = result.replace(/```json|```/g, '').trim();
      items = JSON.parse(clean);
    } catch { items = []; }

    if (!items.length) { btn.textContent = '📖 加入生词本'; alert('没有找到可提取的内容'); return; }

    let added = 0;
    for (const item of items) {
      const text = typeof item === 'string' ? item : item.text;
      const type = typeof item === 'object' ? (item.type || 'word') : 'word';
      const exists = appData.vocab.some(v => v.word.toLowerCase() === text.toLowerCase());
      if (!exists) {
        const entry = {
          id: Date.now() + added,
          word: text, type,
          explanation: '生成中...',
          addedDate: new Date().toISOString(),
          reviewCount: 0, status: 'new'
        };
        appData.vocab.unshift(entry);
        saveVocab(entry);
        added++;
      }
    }
    saveLocalBackup();
    renderVocab();

    document.getElementById('noteSummaryBox').innerHTML +=
      `<div style="background:var(--green-light);color:var(--green);border-radius:8px;padding:10px 14px;font-size:13px;margin-top:10px;">✅ 已添加 ${added} 条到生词本（${items.length - added} 条已存在）</div>`;

    // Async generate explanations, tailored by type
    for (const entry of appData.vocab.filter(v => v.explanation === '生成中...')) {
      const isSentence = entry.type === 'sentence';
      const prompt = isSentence
        ? `You are an English learning assistant for a Chinese learner. Explain this English sentence/expression: "${entry.word}"
**含义**: [用中文解释这句话的意思和语气]
**使用场景**: [什么情况下说这句话，中文]
**类似表达**: [1-2个类似的表达方式，带中文解释]
**注意**: [使用时需要注意的点，中文]`
        : `You are an English learning assistant for a Chinese learner. Explain "${entry.word}" concisely:
**释义**: [中文释义]
**词性**: [词性]
**例句1**: [英文例句] — [中文翻译]
**例句2**: [英文例句] — [中文翻译]
**使用提示**: [一句话使用场景，中文]`;

      callClaude(prompt).then(explanation => {
        const idx = appData.vocab.findIndex(v => v.id === entry.id);
        if (idx !== -1) {
          appData.vocab[idx].explanation = explanation;
          updateVocab(appData.vocab[idx]);
          saveLocalBackup();
          renderVocab();
        }
      }).catch(() => {});
    }

    logActivity('vocab', `从笔记提取了 ${added} 个词/句`);
  } catch { alert('提取失败，请重试'); }

  btn.textContent = '📖 加入生词本';
}

let activeCategory = '';

function renderNotes() {
  if (!appData.notes) appData.notes = [];
  const query = (document.getElementById('notesSearch')?.value || '').toLowerCase();
  const container = document.getElementById('notesContainer');

  // Category filter buttons
  const categories = [...new Set(appData.notes.map(n => n.category).filter(Boolean))];
  const filterEl = document.getElementById('categoryFilter');
  if (filterEl) {
    filterEl.innerHTML = categories.length ? [
      `<button class="btn btn-sm ${activeCategory === '' ? 'btn-primary' : 'btn-ghost'}" onclick="filterCategory('')">全部</button>`,
      ...categories.map(c => `<button class="btn btn-sm ${activeCategory === c ? 'btn-primary' : 'btn-ghost'}" onclick="filterCategory('${c}')">${c}</button>`)
    ].join('') : '';
  }

  const filtered = appData.notes.filter(n => {
    const matchQuery = (n.title || '').toLowerCase().includes(query) || (n.body || '').toLowerCase().includes(query);
    const matchCat = !activeCategory || n.category === activeCategory;
    return matchQuery && matchCat;
  });

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📝</div><p>${appData.notes.length === 0 ? '还没有笔记，上完课就来记一篇吧！' : '没有找到匹配的笔记'}</p></div>`;
    return;
  }

  const catColors = { '生活':'#dcfce7', '工作':'#e8efff', '旅行':'#fef3c7', '社交':'#fce7f3', '文化':'#f3e8ff', '健康':'#d1fae5', '其他':'#f0f0f0' };
  const catTextColors = { '生活':'#16a34a', '工作':'#2563d4', '旅行':'#d97706', '社交':'#db2777', '文化':'#7c3aed', '健康':'#059669', '其他':'#666' };

  container.innerHTML = filtered.map(n => {
    const wordChips = (n.words || []).slice(0, 3).map(w =>
      `<span class="note-word-chip">${w.length > 20 ? w.slice(0,20)+'…' : w}</span>`).join('');
    const moreWords = (n.words || []).length > 3 ? `<span class="note-word-chip">+${n.words.length - 3}</span>` : '';
    const summaryChip = n.summary ? `<span class="note-summary-chip">✨ 已总结</span>` : '';
    const catChip = n.category ? `<span style="background:${catColors[n.category]||'#f0f0f0'};color:${catTextColors[n.category]||'#666'};border-radius:4px;padding:2px 7px;font-size:11px;font-weight:500">${n.category}</span>` : '';

    return `<div class="note-card" onclick="editNote(${n.id})">
      <div class="note-card-header">
        <div class="note-card-title">${n.title || '无标题'} ${catChip}</div>
        <div style="display:flex;gap:6px;flex-shrink:0">
          <div class="note-card-date">${formatDate(n.date)}</div>
          <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteNote(${n.id})">✕</button>
        </div>
      </div>
      ${n.body ? `<div class="note-card-preview">${n.body}</div>` : ''}
      ${n.practice ? `<div style="margin-top:8px;padding:8px 10px;background:var(--accent-light);border-radius:6px;font-size:12px;color:var(--accent);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">🎯 ${n.practice}</div>` : ''}
      <div class="note-card-footer" style="margin-top:8px">${wordChips}${moreWords}${summaryChip}
        <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="event.stopPropagation();practiceFromTopic(${n.id})">练习</button>
      </div>
    </div>`;
  }).join('');

  populateTopicSelector();
}

function filterCategory(cat) {

  renderNotes();
}

function populateTopicSelector() {
  const sel = document.getElementById('topicSelector');
  if (!sel) return;
  const notes = (appData.notes || []).filter(n => n.title);
  const wrap = document.getElementById('topicSelectorWrap');
  if (notes.length > 0) {
    wrap.style.display = 'block';
    const current = sel.value;
    sel.innerHTML = `<option value="">随机出题（不限Topic）</option>` +
      notes.map(n => `<option value="${n.id}" ${n.id == current ? 'selected' : ''}>${n.title}</option>`).join('');
  } else {
    wrap.style.display = 'none';
  }
}

function practiceFromTopic(noteId) {
  // Switch to practice panel and pre-select this topic
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-panel="practice"]').classList.add('active');
  document.getElementById('panel-practice').classList.add('active');
  populateTopicSelector();
  const sel = document.getElementById('topicSelector');
  if (sel) sel.value = noteId;
  document.getElementById('practiceArea').classList.remove('active');
}
